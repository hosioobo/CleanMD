name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    env:
      NO_OPEN: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create cache directories
        run: |
          SWIFTPM_CACHE_ROOT="$RUNNER_TEMP/cleanmd-swiftpm"
          mkdir -p \
            "$SWIFTPM_CACHE_ROOT/home" \
            "$SWIFTPM_CACHE_ROOT/home/.cache" \
            "$SWIFTPM_CACHE_ROOT/clang-module-cache" \
            "$SWIFTPM_CACHE_ROOT/cache"

      - name: Show Swift version
        run: swift --version

      - name: Run Swift package tests
        run: |
          SWIFTPM_CACHE_ROOT="$RUNNER_TEMP/cleanmd-swiftpm"
          HOME="$SWIFTPM_CACHE_ROOT/home" \
          CFFIXED_USER_HOME="$SWIFTPM_CACHE_ROOT/home" \
          XDG_CACHE_HOME="$SWIFTPM_CACHE_ROOT/home/.cache" \
          CLANG_MODULE_CACHE_PATH="$SWIFTPM_CACHE_ROOT/clang-module-cache" \
          SWIFTPM_CUSTOM_CACHE_PATH="$SWIFTPM_CACHE_ROOT/cache" \
          swift test --disable-sandbox

      - name: Run smoke tests
        run: ./scripts/run-smoke-tests.sh

      - name: Build app bundle
        run: ./build.sh
